<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    body {
      font-family: "Outfit", sans-serif;
      background-color: hsl(212, 45%, 89%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    .card {
      background-color: hsl(0, 0%, 100%);
      width: 250px;
      border-radius: 15px;
      text-align: center;
      padding: 15px;
      margin: auto;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .main-p {
      font-weight: 700;
      font-size: 22px;
      color: hsl(218, 44%, 22%);
    }

    .sub-p {
      font-weight: 400;
      font-size: 15px;
      color: hsl(216, 15%, 48%);
    }
  </style>
  <!-- ? google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="card">
    <img src="images/image-qr-code.png" alt="qr code to the frontend mentor website.">
    <p class="main-p">Improve your front-end skills by building projects</p>
    <p class="sub-p">Scan the QR code to visit Frontend mentor and taking your coding skills to the next level</p>
  </div>
</body>
</html>
